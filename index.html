<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PM CORE - Aqua Koi Edition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root {
            /* ✨ より淡く、透き通るような水色グラデーション */
            --bg-1: #e0f2fe; --bg-2: #bae6fd; --bg-3: #7dd3fc; --bg-4: #e0f2fe;
            --surface: rgba(255, 255, 255, 0.75);
            --text: #0f172a; --text-m: #64748b;
            --primary: #0ea5e9; 
            --radius-xl: 32px; --radius-lg: 24px;
        }

        @keyframes aurora { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        body {
            font-family: 'Nunito', 'Zen Maru Gothic', sans-serif;
            margin: 0; background: linear-gradient(-45deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-4));
            background-size: 400% 400%; animation: aurora 15s ease infinite;
            display: flex; flex-direction: column; height: 100dvh; overflow: hidden; color: var(--text);
            position: relative;
        }

        /* ✨ リアルなCaustics（光の網目模様）と波紋シミュレーション */
        body::before {
            content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none; mix-blend-mode: overlay; opacity: 0.4;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)"/></svg>');
        }

        /* ✨ リアルな波紋シミュレーション（物理学的なエネルギー減衰と光の屈折を表現） */
        .ripple {
            position: fixed; border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.6);
            /* 表面張力と波の頂点による光の反射・屈折を表現 */
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.2);
            transform: scale(0); pointer-events: none; z-index: 9999;
            /* 距離の逆二乗則に近い減衰と、水の粘性を加味したイージング */
            animation: rippleAnim cubic-bezier(0.1, 0.4, 0.4, 1) forwards;
        }
        @keyframes rippleAnim {
            0% { transform: scale(0); opacity: 1; border-width: 5px; }
            40% { opacity: 0.6; border-width: 2px; }
            100% { transform: scale(1); opacity: 0; border-width: 0px; }
        }

        /* ✨ タスク完了担当者に応じた色の小さな餌（円） */
        .fish-food {
            position: fixed; width: 12px; height: 12px; border-radius: 50%;
            transform: translate(-50%, -50%); box-shadow: 0 0 8px rgba(255,255,255,0.9);
            z-index: 10; animation: floatFood 1.5s infinite ease-in-out; pointer-events: none;
        }
        @keyframes floatFood {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.5; }
        }

        #loading-screen {
            position: fixed; inset: 0; background: #fff; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease;
        }
        .loader { width: 60px; height: 60px; border: 8px solid var(--bg-2); border-top: 8px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: rgba(255,255,255,0.5); backdrop-filter: blur(10px); border-bottom: 2px solid rgba(255,255,255,0.6); z-index: 20;}
        .project-select { padding: 8px 15px; border-radius: 50px; border: 2px solid #fff; font-weight: 900; font-family: inherit; color: #0284c7; background: var(--surface); cursor: pointer; outline:none; }
        
        header { padding: 15px 20px 5px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 20;}
        .header-titles h1 { margin: 0; font-size: 1.6rem; font-weight: 900; color:#0f172a;}
        .header-titles p { margin: 0; font-size: 0.85rem; font-weight: 800; color: #0284c7; max-width: 75vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        .icon-btn { background: var(--surface); border: 2px solid #fff; color: var(--primary); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.2s; flex-shrink: 0;}
        .icon-btn:hover { transform: scale(1.05); }
        .icon-btn img { width: 100%; height: 100%; object-fit: cover; }

        .dashboard { 
            display: flex; flex-wrap: wrap; padding: 30px 24px; 
            justify-content: center; align-content: flex-start;
            flex-grow: 1; overflow-y: auto; gap: 20px; z-index: 20;
        }

        .circle-block { 
            position: relative; border-radius: 50%; background: linear-gradient(135deg, rgba(255,255,255,0.85), rgba(255,255,255,0.4)); 
            border: 4px solid rgba(255,255,255,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; 
            cursor: pointer; box-shadow: 0 10px 25px rgba(2, 132, 199, 0.15); backdrop-filter: blur(5px);
            user-select: none; -webkit-user-select: none; flex-shrink: 0;
        }

        @keyframes jelly {
            0% { transform: scale(1, 1); }
            30% { transform: scale(1.15, 0.85); }
            40% { transform: scale(0.85, 1.15); }
            50% { transform: scale(1.05, 0.95); }
            65% { transform: scale(0.98, 1.02); }
            75% { transform: scale(1.02, 0.98); }
            100% { transform: scale(1, 1); }
        }
        .jelly-anim { animation: jelly 0.6s ease; }

        .circle-title { font-weight: 900; line-height: 1.2; padding: 0 10%; pointer-events: none; overflow: hidden; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; color:#0f172a;}
        .circle-creator { font-size: 0.6rem; font-weight: 800; margin-top: 4px; opacity: 0.8; pointer-events: none;}
        .badge { position: absolute; top: 0; right: 0; transform: translate(15%, -15%); color: #fff; font-weight: 900; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid #fff; z-index: 2; pointer-events: none;}

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.15); backdrop-filter: blur(5px); display: none; align-items: flex-end; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); width: 100%; max-height: 85vh; border-radius: var(--radius-xl) var(--radius-xl) 0 0; display: flex; flex-direction: column; animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.1); }
        @media (min-width: 600px) { .modal-overlay { align-items: center; } .modal-content { width: 450px; border-radius: var(--radius-xl); animation: fadeInScale 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 10px 40px rgba(0,0,0,0.1);} }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .modal-header { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; }
        .modal-title-input { font-family: inherit; border: none; font-size: 1.5rem; font-weight: 900; width: 100%; outline: none; color:#0f172a; background:transparent;}
        .close-btn { background: #f1f5f9; border: none; width: 32px; height: 32px; border-radius: 50%; font-weight: 900; cursor: pointer; color:var(--text-m);}

        .task-list { padding: 0 24px; overflow-y: auto; flex-grow: 1; }
        .task-item { display: flex; align-items: center; padding: 12px; margin-bottom: 10px; background: rgba(248, 250, 252, 0.8); border-radius: var(--radius-lg); border: 2px solid #e2e8f0; }
        .drag-handle { cursor: grab; padding: 5px; margin-right: 10px; color: #cbd5e1; font-size: 1.2rem; user-select: none; }
        .task-checkbox { appearance: none; width: 22px; height: 22px; border-radius: 6px; border: 3px solid #cbd5e1; margin-right: 12px; cursor: pointer; position: relative; }
        .task-checkbox:checked { background: var(--primary); border-color: var(--primary); }
        .task-checkbox:checked::after { content: '✔'; position: absolute; inset: 0; color: #fff; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .task-content { flex-grow: 1; display: flex; flex-direction: column; }
        .task-text { font-family: inherit; font-weight: 700; outline: none; color:#0f172a;}
        .task-item.completed .task-text { text-decoration: line-through; opacity: 0.5; }
        .task-tag { font-size: 0.7rem; font-weight: 900; padding: 2px 8px; border-radius: 10px; color: #fff; margin-top: 4px; display: inline-block; }

        .toggle-completed-btn { background: transparent; border: 2px dashed #cbd5e1; color: #64748b; font-weight: 800; padding: 10px 20px; border-radius: 50px; font-size: 0.85rem; cursor: pointer; margin-bottom: 15px; width: 100%; font-family: inherit; transition: 0.2s; }
        .toggle-completed-btn:hover { border-color: var(--primary); color: var(--primary); background: #f0f9ff;}

        .add-area { padding: 20px 24px; display: flex; gap: 8px; border-top: 2px dashed #f1f5f9; }
        .assign-sel { padding: 10px; border-radius: 10px; border: 2px solid #f1f5f9; font-weight: 800; font-family: inherit; color:#0f172a; outline: none;}
        .add-input { flex-grow: 1; padding: 10px 15px; border-radius: 10px; border: 2px solid #f1f5f9; font-family: inherit; font-weight: 800; outline: none; }
        .add-btn { background: var(--primary); color: #fff; border: none; padding: 0 15px; border-radius: 10px; font-weight: 900; cursor: pointer; }

        .auth-overlay { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; text-align: center; }
        .auth-card { padding: 40px; width: 85%; max-width: 320px; }
        .google-login { width: 100%; padding: 15px; border-radius: 50px; border: 2px solid #f1f5f9; background: #fff; font-weight: 900; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .color-opt { width: 35px; height: 35px; border-radius: 50%; border: 3px solid #fff; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .color-opt.selected { transform: scale(1.2); border-color: #0f172a; box-shadow: 0 4px 10px rgba(0,0,0,0.2);}

        .profile-img-btn { position: relative; width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin: 0 auto 20px; cursor: pointer; overflow: hidden; background: #f1f5f9; display: flex; align-items: center; justify-content: center;}
        .profile-img-btn img { width: 100%; height: 100%; object-fit: cover; }
        .profile-img-btn::after { content: '📷'; position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.4); color: #fff; font-size: 0.8rem; padding: 4px 0; text-align: center; }
        input[type="file"] { display: none; }
    </style>
</head>

        let memberProfiles = {};
        
        let lastClickX = window.innerWidth / 2;
        let lastClickY = window.innerHeight / 2;

        const colors = ["#38bdf8", "#fb7185", "#34d399", "#fbbf24", "#a78bfa", "#f472b6", "#fb923c", "#0f172a"];
        let selC = colors[0];

        // ✨ 流体力学的な波の伝播と分散を模した、リアルでランダムな波紋生成関数
        function spawnRipple(x, y) {
            // 波紋の輪の数をランダムに（2〜5個）
            const numRings = Math.floor(Math.random() * 4) + 2; 
            
            for (let i = 0; i < numRings; i++) {
                // 波の発生間隔にランダムな揺らぎを加える（位相速度と群速度の違いによる波束の分散を表現）
                const delay = i * (200 + Math.random() * 150); 
                
                setTimeout(() => {
                    const ripple = document.createElement('div');
                    ripple.className = 'ripple';
                    ripple.style.left = x + 'px';
                    ripple.style.top = y + 'px';
                    
                    // エネルギーの減衰（広がるほど薄くなる）と波長のばらつき
                    const baseSize = 120 + Math.random() * 150; // 最大到達サイズ（120px〜270px）
                    const duration = 1.5 + Math.random() * 1.5;   // 伝播時間（1.5s〜3.0s）
                    
                    ripple.style.width = baseSize + 'px';
                    ripple.style.height = baseSize + 'px';
                    ripple.style.margin = `-${baseSize / 2}px 0 0 -${baseSize / 2}px`; // 中心合わせ
                    ripple.style.animationDuration = duration + 's';
                    
                    document.body.appendChild(ripple);
                    setTimeout(() => ripple.remove(), duration * 1000); 
                }, delay);
            }
        }

        document.addEventListener('click', (e) => {
            lastClickX = e.clientX; lastClickY = e.clientY;
            spawnRipple(e.clientX, e.clientY);
        });

        function buildColors(containerId) {
            const ctn = document.getElementById(containerId); ctn.innerHTML = '';
            colors.forEach(c => {
                const dv = document.createElement('div'); dv.className = 'color-opt'; dv.style.background = c;
                if(c == selC) dv.classList.add('selected');
                dv.onclick = () => { ctn.querySelectorAll('.color-opt').forEach(x=>x.classList.remove('selected')); dv.classList.add('selected'); selC = c; };
                ctn.appendChild(dv);
            });
        }

        window.handleImageUpload = (event, imgId) => {
            const file = event.target.files[0]; if(!file) return;
            const reader = new FileReader(); reader.onload = (e) => {
                const img = new Image(); img.onload = () => {
                    const canvas = document.createElement('canvas'); const size = 150; canvas.width = size; canvas.height = size;
                    const ctx = canvas.getContext('2d'); const min = Math.min(img.width, img.height);
                    ctx.drawImage(img, (img.width-min)/2, (img.height-min)/2, min, min, 0, 0, size, size);
                    tempPhoto = canvas.toDataURL('image/jpeg', 0.8); document.getElementById(imgId).src = tempPhoto;
                }; img.src = e.target.result;
            }; reader.readAsDataURL(file);
        };

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                user = u;
                const d = await getDoc(doc(db, "users", u.uid));
                if (d.exists()) { 
                    myP = d.data(); 
                    myP._isDummy = false; 
                    memberProfiles[user.email] = myP; 

                    updateHeaderIcon(); 
                    loadPJs(); 
                } else { showSetup(); }
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('login-v').style.display = 'block';
                document.getElementById('setup-v').style.display = 'none';
                hideLoading();
            }
        });

        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

        function showSetup() {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('login-v').style.display = 'none';
            document.getElementById('setup-v').style.display = 'block';
            document.getElementById('setup-n').value = user.displayName;
            tempPhoto = user.photoURL || "";
            document.getElementById('setup-img').src = tempPhoto;
            buildColors('setup-colors'); hideLoading();
        }

        window.finishSetup = async () => {
            const name = document.getElementById('setup-n').value;
            if(!name) return alert("名前を入力してね");
            myP = { email: user.email, name, color: selC, photo: tempPhoto }; 
            await setDoc(doc(db, "users", user.uid), myP);
            myP._isDummy = false; memberProfiles[user.email] = myP;
            await addDoc(collection(db, "projects"), { title: "My Tasks", members: [user.email], blocks: [], koiSize: 0.5 });
            location.reload();
        };

        window.openProfile = () => {
            document.getElementById('edit-n').value = myP.name;
            selC = myP.color || colors[0]; tempPhoto = myP.photo || "";
            document.getElementById('edit-img').src = tempPhoto;
            buildColors('edit-colors'); window.openM('profile-m');
        };

        window.saveProfile = async () => {
            const name = document.getElementById('edit-n').value; if(!name) return;
            myP.name = name; myP.color = selC; myP.photo = tempPhoto;
            await setDoc(doc(db, "users", user.uid), myP, {merge: true});
            memberProfiles[user.email] = myP; updateHeaderIcon(); window.closeM('profile-m'); syncCurPJ(); 
        };

        function updateHeaderIcon() {
            document.getElementById('header-user-icon').src = myP.photo || "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='%2338bdf8' viewBox='0 0 24 24'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>";
        }

        async function fetchMemberProfiles() {
            if (!curPD || !curPD.members) return;
            let needsUpdate = false;
            for (const email of curPD.members) {
                if (!memberProfiles[email] || memberProfiles[email]._isDummy) {
                    const q = query(collection(db, "users"), where("email", "==", email));
                    const qs = await getDocs(q);
                    if (!qs.empty) {
                        memberProfiles[email] = qs.docs[0].data();
                        memberProfiles[email]._isDummy = false;
                        needsUpdate = true;
                    } else if (!memberProfiles[email]) {
                        memberProfiles[email] = { name: email.split('@')[0], color: '#94a3b8', _isDummy: true };
                        needsUpdate = true;
                    }
                }
            }
            if (needsUpdate) {
                updateHeaderMembers(); updateAssList(); renderDash();
                if(curBId) renderTasks();
            }
        }

        function loadPJs() {
            const q = query(collection(db, "projects"), where("members", "array-contains", user.email));
            onSnapshot(q, (sn) => {
                pjs = sn.docs.map(d => ({ id: d.id, data: d.data() }));
                updateProjList();
                const savedProjId = localStorage.getItem('last_proj_id');
                if (pjs.length > 0) {
                    if (savedProjId && pjs.find(p => p.id === savedProjId)) { curPId = savedProjId; } 
                    else if (!curPId || !pjs.find(p => p.id === curPId)) { curPId = pjs[0].id; }
                    document.getElementById('proj-sel').value = curPId;
                    syncCurPJ();
                }
                hideLoading();
            });
        }

        function syncCurPJ() {
            const p = pjs.find(x => x.id == curPId); if(!p) return;
            curPD = p.data;
            document.getElementById('header-pj-name').innerText = curPD.title;
            
            kSize = curPD.koiSize || 0.5;

            updateHeaderMembers(); renderDash(); updateAssList();
            if(curBId) renderTasks();
            fetchMemberProfiles();
        }

        function updateHeaderMembers() {
            const activeMembers = curPD.members.filter(m => memberProfiles[m] && !memberProfiles[m]._isDummy);
            const names = activeMembers.map(m => memberProfiles[m].name);
            document.getElementById('mem-count').innerText = "👤 " + (names.length > 0 ? names.join(', ') : "-");
        }

        function renderDash() {
            const el = document.getElementById('dashboard'); el.innerHTML = '';
            const w = el.clientWidth - 40, h = el.clientHeight - 40;
            const blks = curPD.blocks || [], total = blks.length + 1;
            let opt = 0;
            for(let c=1; c<=total; c++) { let r = Math.ceil(total/c); let s = Math.min((w-(c-1)*20)/c, (h-(r-1)*20)/r); if(s > opt) opt = s; }
            const size = Math.min(Math.max(opt, 80), 140); 
            
            blks.forEach(b => {
                const div = document.createElement('div'); div.className = 'circle-block';
                div.style.width = div.style.height = size + 'px'; div.style.borderColor = b.color;
                
                div.onclick = (e) => {
                    if(isDraggingCircle) return; 
                    div.classList.add('jelly-anim');
                    setTimeout(() => { div.classList.remove('jelly-anim'); window.openTaskM(b.id); }, 250); 
                };

                div.innerHTML = `<div class="circle-title" style="font-size:${size*0.14}px">${b.title}</div><div class="circle-creator" style="color:${b.color}">by ${b.userName}</div>`;
                
                const myUncompletedTasks = (b.items || []).filter(i => 
                    !i.completed && (i.assEmail === user.email || i.assName === user.email.split('@')[0] || i.assName === myP.name)
                );
                const uc = myUncompletedTasks.length;

                if(uc > 0) {
                    const bg = document.createElement('div'); bg.className='badge';
                    bg.style.width = bg.style.height = Math.max(25, size*0.3)+'px';
                    bg.style.fontSize = Math.max(12, size*0.15)+'px';
                    bg.innerText = uc; bg.style.background = b.color; div.appendChild(bg);
                }
                el.appendChild(div);
            });
            
            const add = document.createElement('div'); add.className = 'circle-block add-new'; add.style.width = add.style.height = size + 'px';
            add.style.borderStyle = 'dashed'; add.innerHTML = `<span style="font-size:2.5rem; color:var(--primary)">＋</span>`;
            add.onclick = window.addBlock; el.appendChild(add);

            if(window.dashSortable) window.dashSortable.destroy();
            window.dashSortable = Sortable.create(el, {
                animation: 250, delay: 200, delayOnTouchOnly: true, filter: '.add-new',
                onStart: () => { isDraggingCircle = true; },
                onEnd: async (e) => {
                    setTimeout(() => { isDraggingCircle = false; }, 50);
                    if(e.oldIndex === e.newIndex) return;
                    const moved = curPD.blocks.splice(e.oldIndex, 1)[0];
                    curPD.blocks.splice(e.newIndex, 0, moved);
                    await save();
                }
            });
        }

        window.openTaskM = (id) => {
            curBId = id; const b = curPD.blocks.find(x=>x.id==id);
            document.getElementById('m-title').value = b.title;
            document.getElementById('m-title').style.color = b.color;
            showCompletedTasks = false; 
            renderTasks(); window.openM('modal');
        };

        function createTaskDom(item) {
            const div = document.createElement('div'); div.className = `task-item ${item.completed ? 'completed' : ''}`;
            const displayName = (item.assEmail && memberProfiles[item.assEmail]) ? memberProfiles[item.assEmail].name : item.assName;
            const displayColor = (item.assEmail && memberProfiles[item.assEmail]) ? memberProfiles[item.assEmail].color : (item.assColor || '#94a3b8');

            div.innerHTML = `<div class="drag-handle" style="${item.completed ? 'visibility:hidden;' : ''}">≡</div>
                             <input type="checkbox" class="task-checkbox" ${item.completed?'checked':''} onchange="window.toggleT('${item.id}', '${displayColor}')">
                             <div class="task-content"><div class="task-text" contenteditable="${!item.completed}" onblur="window.editT('${item.id}', this.innerText)">${item.text}</div>
                             <span class="task-tag" style="background:${displayColor}">${displayName}</span></div>
                             <button style="border:none; background:none; cursor:pointer; font-size:1.2rem; color:#cbd5e1;" onclick="window.delT('${item.id}')">✕</button>`;
            return div;
        }

        function renderTasks() {
            const b = curPD.blocks.find(x=>x.id==curBId);
            const activeContainer = document.getElementById('active-task-list');
            const compSection = document.getElementById('completed-task-section');
            activeContainer.innerHTML = ''; compSection.innerHTML = '';
            
            if(!b.items) b.items = [];
            
            const activeTasks = b.items.filter(i => !i.completed);
            const completedTasks = b.items.filter(i => i.completed);

            activeTasks.forEach(item => activeContainer.appendChild(createTaskDom(item)));

            if(completedTasks.length > 0) {
                const btn = document.createElement('button');
                btn.className = 'toggle-completed-btn';
                btn.innerText = showCompletedTasks ? '完了したタスクを隠す ∧' : `完了したタスクを表示 (${completedTasks.length}) ∨`;
                btn.onclick = () => { showCompletedTasks = !showCompletedTasks; renderTasks(); };
                compSection.appendChild(btn);

                if(showCompletedTasks) {
                    const compContainer = document.createElement('div');
                    completedTasks.forEach(item => compContainer.appendChild(createTaskDom(item)));
                    compSection.appendChild(compContainer);
                }
            }

            if(window.taskSortable) window.taskSortable.destroy();
            window.taskSortable = Sortable.create(activeContainer, { 
                animation: 150, handle: '.drag-handle', 
                onEnd: async (e) => { 
                    if(e.oldIndex === e.newIndex) return;
                    const moved = activeTasks.splice(e.oldIndex, 1)[0]; 
                    activeTasks.splice(e.newIndex, 0, moved); 
                    b.items = [...activeTasks, ...completedTasks];
                    await save(); 
                } 
            });
        }

        window.addTask = async () => {
            const input = document.getElementById('t-input'), text = input.value.trim(); if(!text) return;
            const assE = document.getElementById('ass-sel').value;
            const profile = memberProfiles[assE] || { name: assE.split('@')[0], color: '#94a3b8' };
            const b = curPD.blocks.find(x=>x.id==curBId);
            if(!b.items) b.items = [];
            
            b.items.unshift({ 
                id: Date.now().toString(), text, completed: false, 
                assName: profile.name, assEmail: assE, assColor: profile.color 
            });
            input.value = ''; await save();
        };

        window.toggleT = async (tid, color) => { 
            const b = curPD.blocks.find(x=>x.id==curBId); 
            const i = b.items.find(x=>x.id==tid); 
            const wasCompleted = i.completed;
            i.completed = !i.completed; 
            
            if (!wasCompleted && i.completed) {
                spawnFood(lastClickX, lastClickY, color);
            }

            const active = b.items.filter(x => !x.completed);
            const comp = b.items.filter(x => x.completed);
            b.items = [...active, ...comp];
            
            await save(); 
        };

        window.editT = async (tid, txt) => { const b = curPD.blocks.find(x=>x.id==curBId); const i = b.items.find(x=>x.id==tid); if(i.text != txt){ i.text = txt; await save(); } };
        window.delT = async (tid) => { const b = curPD.blocks.find(x=>x.id==curBId); b.items = b.items.filter(x=>x.id!=tid); await save(); };
        window.saveName = async () => { const b = curPD.blocks.find(x=>x.id==curBId); const val = document.getElementById('m-title').value; if(b.title != val) { b.title = val; await save(); } };
        
        window.addBlock = async () => {
            const id = Date.now().toString();
            curPD.blocks.push({ id, title: "新しいカテゴリ", userName: myP.name, color: myP.color, items: [] });
            await save(); window.openTaskM(id);
        };

        window.delBlock = async () => { if(!confirm("削除しますか？")) return; curPD.blocks = curPD.blocks.filter(x=>x.id != curBId); await save(); window.closeM('modal'); };
        
        window.createPJ = async () => { const t = document.getElementById('new-p-t').value; if(!t) return; await addDoc(collection(db, "projects"), { title: t, members: [user.email], blocks: [], koiSize: 0.5 }); window.closeM('new-p-m'); };
        
        window.sendInv = async () => { const e = document.getElementById('inv-e').value; if(!e) return; if(!curPD.members.includes(e)) { curPD.members.push(e); await save(); alert("招待しました"); } window.closeM('invite-m'); };
        
        window.switchProj = () => { curPId = document.getElementById('proj-sel').value; localStorage.setItem('last_proj_id', curPId); syncCurPJ(); };
        async function save() { await setDoc(doc(db, "projects", curPId), curPD); }
        
        window.openM = (id) => document.getElementById(id).classList.add('active');
        window.closeM = (id) => { document.getElementById(id).classList.remove('active'); if(id=='modal') curBId=null; };
        function hideLoading() { document.getElementById('loading-screen').style.opacity = '0'; setTimeout(() => document.getElementById('loading-screen').style.display='none', 500); }
        window.addEventListener('resize', renderDash);
        
        function updateProjList() { const sel = document.getElementById('proj-sel'); sel.innerHTML = ''; pjs.forEach(p => { const o = document.createElement('option'); o.value = p.id; o.innerText = p.data.title; sel.appendChild(o); }); sel.value = curPId; }
        function updateAssList() { const sel = document.getElementById('ass-sel'); sel.innerHTML = ''; const activeMembers = curPD.members.filter(m => memberProfiles[m] && !memberProfiles[m]._isDummy); activeMembers.forEach(m => { const o = document.createElement('option'); o.value = m; o.innerText = memberProfiles[m].name; sel.appendChild(o); }); sel.value = user.email; }

        function getScreenScale() {
            if (window.innerWidth < 500) return 0.7; 
            if (window.innerWidth < 800) return 0.85; 
            return 1.0; 
        }

        const KOI_BASE_SPEED = 0.6;     
        const KOI_CHASE_SPEED = 3.0;    
        const KOI_TURN_SOFTNESS = 0.02; 
        const SWAY_AMP = 0.1;           
        const SWAY_FREQ = 0.004;        

        let koiEl = document.getElementById('koi-fish');
        let kX = window.innerWidth / 2, kY = window.innerHeight / 2;
        let kAngle = 0, kSize = 0.5; 
        let speed = KOI_BASE_SPEED; 
        let currentTarget = null;
        let foods = [];

        function spawnFood(x, y, color) {
            const food = document.createElement('div');
            food.className = 'fish-food';
            food.style.left = x + 'px';
            food.style.top = y + 'px';
            food.style.backgroundColor = color || '#ffcc00';
            document.body.appendChild(food);
            foods.push({ el: food, x, y });
        }

        function updateKoi() {
            if (!koiEl) return;

            let massFactor = Math.sqrt(0.5 / Math.max(0.5, kSize));
            let currentBaseSpeed = KOI_BASE_SPEED * massFactor;
            let currentChaseSpeed = KOI_CHASE_SPEED * massFactor;
            let currentTurnSoftness = KOI_TURN_SOFTNESS * massFactor;
            let currentSwayFreq = SWAY_FREQ * massFactor;

            let tx, ty;
            
            if (foods.length > 0) {
                tx = foods[0].x; ty = foods[0].y;
                speed = currentChaseSpeed; 
            } else {
                if (!currentTarget || Math.random() < 0.003) { 
                    currentTarget = { x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight };
                }
                tx = currentTarget.x; ty = currentTarget.y;
                speed = currentBaseSpeed; 
            }

            let dx = tx - kX;
            let dy = ty - kY;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if (foods.length > 0 && dist < 30) {
                let f = foods.shift();
                f.el.remove();
                
                kSize += 0.05;
                
                if (curPD) {
                    curPD.koiSize = kSize;
                    save(); 
                }

                // ✨ 餌を食べた時にも複数の波紋を発生させる
                spawnRipple(kX, kY);
            }

            if (dist > speed) {
                let targetAngle = Math.atan2(dy, dx);
                let deltaAngle = targetAngle - kAngle;
                
                while (deltaAngle > Math.PI) deltaAngle -= Math.PI * 2;
                while (deltaAngle < -Math.PI) deltaAngle += Math.PI * 2;
                
                kAngle += deltaAngle * currentTurnSoftness; 

                kX += Math.cos(kAngle) * speed;
                kY += Math.sin(kAngle) * speed;
            }

            let baseDisplayAngle = kAngle + (Math.PI / 2);
            let bodySway = Math.sin(Date.now() * currentSwayFreq) * SWAY_AMP * (speed / currentBaseSpeed);
            let finalAngle = baseDisplayAngle + bodySway;

            let finSway = Math.sin(Date.now() * currentSwayFreq * 1.5) * 15 * (speed / currentBaseSpeed); 
            let tailSway = Math.sin(Date.now() * currentSwayFreq - 1.0) * 25 * (speed / currentBaseSpeed);

            document.getElementById('koi-fin-chest-l').setAttribute('transform', `rotate(${finSway}, 70, 120)`);
            document.getElementById('koi-fin-chest-r').setAttribute('transform', `rotate(${-finSway}, 130, 120)`);
            document.getElementById('koi-fin-tail').setAttribute('transform', `rotate(${tailSway}, 100, 280)`);
            document.getElementById('koi-fin-tail-2').setAttribute('transform', `rotate(${tailSway}, 100, 280)`);

            let currentScreenScale = getScreenScale();

            koiEl.style.left = kX + 'px';
            koiEl.style.top = kY + 'px';
            koiEl.style.transform = `translate(-50%, -50%) scale(${kSize * currentScreenScale}) rotate(${finalAngle}rad)`;

            requestAnimationFrame(updateKoi);
        }
        
        updateKoi();

    </script>
</body>
</html>
