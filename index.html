<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PM CORE - Aqua Koi Edition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root {
            --bg-1: #e0f2fe; --bg-2: #bae6fd; --bg-3: #7dd3fc; --bg-4: #e0f2fe;
            --surface: rgba(255, 255, 255, 0.75);
            --text: #0f172a; --text-m: #64748b;
            --primary: #0ea5e9; 
            --radius-xl: 32px; --radius-lg: 24px;
        }

        * { -webkit-tap-highlight-color: transparent; }

        @keyframes aurora { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        body {
            font-family: 'Nunito', 'Zen Maru Gothic', sans-serif;
            margin: 0; background-color: #e0f2fe; 
            background-image: linear-gradient(-45deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-4));
            background-size: 400% 400%; animation: aurora 15s ease infinite;
            display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; color: var(--text);
            position: relative;
        }

        body::before {
            content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0.15;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)"/></svg>');
        }

        .ripple {
            position: fixed; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.7), inset 0 0 15px rgba(255, 255, 255, 0.4);
            pointer-events: none; z-index: 9999; transform-origin: center;
            animation: rippleAnim cubic-bezier(0.15, 0.6, 0.3, 1) forwards;
        }
        @keyframes rippleAnim { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; border-width: 4px; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; border-width: 0px; } }

        .fish-food { position: fixed; width: 12px; height: 12px; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 8px rgba(255,255,255,0.9); z-index: 10; animation: floatFood 1.5s infinite ease-in-out; pointer-events: none; }
        @keyframes floatFood { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; } 50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.5; } }

        #loading-screen { position: fixed; inset: 0; background: #fff; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        .loader { width: 60px; height: 60px; border: 8px solid var(--bg-2); border-top: 8px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: rgba(255,255,255,0.5); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 2px solid rgba(255,255,255,0.6); z-index: 20;}
        .project-select { padding: 8px 15px; border-radius: 50px; border: 2px solid #fff; font-weight: 900; font-family: inherit; color: #0284c7; background: var(--surface); cursor: pointer; outline:none; }
        
        header { padding: 15px 20px 5px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 20;}
        .header-titles h1 { margin: 0; font-size: 1.6rem; font-weight: 900; color:#0f172a;}
        .header-titles .mem-list { margin: 6px 0 0 0; font-size: 0.8rem; font-weight: 800; color: #0f172a; display: flex; overflow-x: auto; scrollbar-width: none; width: 75vw; padding-bottom: 5px;}
        .header-titles .mem-list::-webkit-scrollbar { display: none; }
        
        .icon-btn { background: var(--surface); border: 2px solid #fff; color: var(--primary); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.2s; flex-shrink: 0;}
        .icon-btn:hover { transform: scale(1.05); }
        .icon-btn img { width: 100%; height: 100%; object-fit: cover; }

        .dashboard { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; flex-grow: 1; overflow-y: auto; z-index: 20; padding-bottom: 60px;}
        
        /* ✨ 新UI：海に浮かぶ「砂浜の島」デザイン */
        .island-panel {
            background: #fde6b3; /* ✨ 修正：砂浜の色 */
            border: 2px solid #ecd39a; /* ✨ 修正：縁 */
            border-radius: 50%; /* ✨ 修正：丸い島 */
            aspect-ratio: 1 / 1; /* ✨ 修正：正円 */
            display: flex; flex-direction: column; align-items: center; justify-content: center; /* ✨ コンテンツを中央に */
            /* ✨ 修正：立体感のある影（海底へ続く崖） */
            box-shadow: 0 15px 0 rgba(14, 165, 233, 0.4), 0 20px 25px rgba(0,0,0,0.2);
            box-sizing: border-box; width: 100%; max-width: 800px; transition: all 0.3s ease;
            position: relative;
            margin-bottom: 25px; /* ✨ 影の分の余白 */
        }
        /* ✨ 修正：南国の茂み（左上） */
        .island-panel::before {
            content: ''; position: absolute; top: 0; left: 0; transform: translate(-30%, -30%); width: 60px; height: 50px;
            background: #7cb342; border-radius: 60% 40% 70% 50%;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.1), 0 5px 0 #558b2f;
            z-index: 1; pointer-events: none;
        }
        /* ✨ 修正：南国の茂み（右下） */
        .island-panel::after {
            content: ''; position: absolute; bottom: 0; right: 0; transform: translate(30%, 30%); width: 70px; height: 45px;
            background: #689f38; border-radius: 40% 60% 50% 70%;
            box-shadow: inset 5px 5px 10px rgba(255,255,255,0.2), 0 5px 0 #33691e;
            z-index: 1; pointer-events: none;
        }
        /* 島の中のコンテンツ（旗とタスク）は茂みよりも上に。 */
        .panel-header, .panel-circles { position: relative; z-index: 2; }

        .panel-header { 
            display: flex; justify-content: space-between; align-items: center; padding: 0; cursor: pointer; 
            background: transparent; border-radius: 0; transition: 0.2s;
            position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%); /* ✨ 修正：島の中央上部に旗を立てる */
            z-index: 10; /* ✨ 島よりも上に */
            pointer-events: auto; /* ✨ クリック可能に */
            width: auto; /* ✨ 幅は中身に合わせる */
        }
        .island-panel.open .panel-header { border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom: 0; }
        
        /* ✨ 新UI：旗のコンテナ */
        .flag-container {
            display: flex; align-items: flex-start; /* ✨ 旗竿と旗の体を並べる */
        }

        /* ✨ 新UI：旗竿 */
        .flag-pole {
            width: 6px; height: 100px; /* ✨ 旗竿のサイズ。長さは適宜調整。 */
            background: #8b6a43; /* ✨ 旗竿の色（茶色） */
            border-radius: 3px;
        }

        /* ✨ 新UI：旗の体 */
        .flag-body {
            background: #fff; /* ✨ 旗の色 */
            border: 2px solid #8b6a43; /* ✨ 旗の縁 */
            padding: 5px 15px; border-radius: 5px; /* ✨ パディングと角丸 */
            display: flex; align-items: center; gap: 5px; /* ✨ 中身を並べる */
            margin-left: -3px; /* ✨ 旗竿に少し重ねる */
            position: relative; /* ✨ 削除ボタンの配置用 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .panel-title { 
            background: transparent; border: none; font-size: 1rem; font-weight: 900; color: #5c3a21; outline: none; width: 100%; font-family: inherit; 
            margin-left: 0; /* ✨ マージン調整 */
        }
        .toggle-icon { font-size: 0.8rem; color: #8b6a43; transition: transform 0.3s; display: inline-block; }
        .island-panel.open .toggle-icon { transform: rotate(90deg); }
        
        .del-group-btn { 
            background: rgba(255, 255, 255, 0.7); border: 1px solid #dcb66a; border-radius: 50%; width: 28px; height: 28px; font-size: 0.8rem; font-weight: 900; color: #8b6a43; cursor: pointer; flex-shrink: 0;
            position: absolute; top: -10px; right: -10px; /* ✨ 修正：旗の上に配置 */
        }
        
        .panel-circles { display: none; flex-wrap: wrap; justify-content: center; align-items: center; padding: 30px 20px; } /* ✨ 修正：パディング調整。中央に寄せる。旗のために上を少し空ける。 */
        .island-panel.open .panel-circles { display: flex; }
        
        /* ✨ 修正：「新しい島を追加」ボタンも砂浜の島のようなデザインに */
        .add-new-group { 
            cursor: pointer; border: 3px dashed rgba(255, 255, 255, 0.5); 
            display: flex; justify-content: center; align-items: center; padding: 15px; 
            background: #fde6b3; /* ✨ 砂浜の色 */
            border-radius: 60px; /* ✨ 丸みを帯びた形状 */
            width: 100%; max-width: 800px; 
            text-align: center; font-weight: 900; color: #8b6a43; font-size: 1.1rem; /* ✨ 修正：文字色調整 */
            transition: background 0.2s;
            box-shadow: 0 10px 0 rgba(14, 165, 233, 0.3); /* ✨ 影 */
            margin-bottom: 10px; /* ✨ 影の分の余白 */
        }
        .add-new-group:hover { background: #fbe6c3; }

        .circle-block { position: relative; box-sizing: border-box; border-radius: 50%; background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.6)); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; cursor: pointer; box-shadow: 0 10px 25px rgba(2, 132, 199, 0.15); user-select: none; -webkit-user-select: none; flex-shrink: 0; }
        .circle-title { font-weight: 900; line-height: 1.2; padding: 0 10%; pointer-events: none; overflow: hidden; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; color:#0f172a;}

        /* ✨ プラスボタンのスタイル */
        .circle-block.add-new {
            border: 1px dashed rgba(15, 23, 42, 0.15); /* 線の太さを1pxにし、色を淡いライトグレーに変更 */
            background: rgba(255, 255, 255, 0.3); /* 背景を少し透明にしてなじませる */
        }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.15); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); display: none; align-items: flex-end; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); width: 100%; max-height: 85vh; border-radius: var(--radius-xl) var(--radius-xl) 0 0; display: flex; flex-direction: column; animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.1); }
        @media (min-width: 600px) { .modal-overlay { align-items: center; } .modal-content { width: 450px; border-radius: var(--radius-xl); animation: fadeInScale 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 10px 40px rgba(0,0,0,0.1);} }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .modal-header { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; }
        .modal-title-input { font-family: inherit; border: none; font-size: 1.5rem; font-weight: 900; width: 100%; outline: none; color:#0f172a; background:transparent;}
        .close-btn { background: #f1f5f9; border: none; width: 32px; height: 32px; border-radius: 50%; font-weight: 900; cursor: pointer; color:var(--text-m);}

        .task-list { padding: 0 24px; overflow-y: auto; flex-grow: 1; }
        .task-item { display: flex; align-items: center; padding: 12px; margin-bottom: 10px; background: rgba(248, 250, 252, 0.8); border-radius: var(--radius-lg); border: 2px solid #e2e8f0; }
        .drag-handle { cursor: grab; padding: 5px; margin-right: 10px; color: #cbd5e1; font-size: 1.2rem; user-select: none; }
        .task-checkbox { appearance: none; width: 22px; height: 22px; border-radius: 6px; border: 3px solid #cbd5e1; margin-right: 12px; cursor: pointer; position: relative; }
        .task-checkbox:checked { background: var(--primary); border-color: var(--primary); }
        .task-checkbox:checked::after { content: '✔'; position: absolute; inset: 0; color: #fff; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .task-content { flex-grow: 1; display: flex; flex-direction: column; }
        .task-text { font-family: inherit; font-weight: 700; outline: none; color:#0f172a;}
        .task-item.completed .task-text { text-decoration: line-through; opacity: 0.5; }
        .task-tag { font-size: 0.7rem; font-weight: 900; padding: 3px 8px 3px 4px; border-radius: 12px; color: #fff; margin-top: 4px; display: inline-flex; align-items: center; gap: 4px; width: fit-content; }

        .toggle-completed-btn { background: transparent; border: 2px dashed #cbd5e1; color: #64748b; font-weight: 800; padding: 10px 20px; border-radius: 50px; font-size: 0.85rem; cursor: pointer; margin-bottom: 15px; width: 100%; font-family: inherit; transition: 0.2s; }
        .toggle-completed-btn:hover { border-color: var(--primary); color: var(--primary); background: #f0f9ff;}

        .add-area { padding: 20px 24px; display: flex; gap: 8px; border-top: 2px dashed #f1f5f9; }
        .assign-sel { padding: 10px; border-radius: 10px; border: 2px solid #f1f5f9; font-weight: 800; font-family: inherit; color:#0f172a; outline: none; max-width: 140px;}
        .add-input { flex-grow: 1; padding: 10px 15px; border-radius: 10px; border: 2px solid #f1f5f9; font-family: inherit; font-weight: 800; outline: none; }
        .add-btn { background: var(--primary); color: #fff; border: none; padding: 0 15px; border-radius: 10px; font-weight: 900; cursor: pointer; }

        .auth-overlay { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; text-align: center; }
        .auth-card { padding: 40px; width: 85%; max-width: 320px; }
        .google-login { width: 100%; padding: 15px; border-radius: 50px; border: 2px solid #f1f5f9; background: #fff; font-weight: 900; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .color-opt { width: 35px; height: 35px; border-radius: 50%; border: 3px solid #fff; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .color-opt.selected { transform: scale(1.2); border-color: #0f172a; box-shadow: 0 4px 10px rgba(0,0,0,0.2);}

        .profile-img-btn { position: relative; width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin: 0 auto 20px; cursor: pointer; overflow: hidden; background: #f1f5f9; display: flex; align-items: center; justify-content: center;}
        .profile-img-btn img { width: 100%; height: 100%; object-fit: cover; }
        .profile-img-btn::after { content: '📷'; position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.4); color: #fff; font-size: 0.8rem; padding: 4px 0; text-align: center; }
        input[type="file"] { display: none; }
        
        @keyframes jelly { 0% { transform: scale(1, 1); } 30% { transform: scale(1.15, 0.85); } 40% { transform: scale(0.85, 1.15); } 50% { transform: scale(1.05, 0.95); } 65% { transform: scale(0.98, 1.02); } 75% { transform: scale(1.02, 0.98); } 100% { transform: scale(1, 1); } }
        .jelly-anim { animation: jelly 0.6s ease; }
    </style>
</head>
<body>

    <svg id="koi-fish" viewBox="0 0 200 400" style="position:fixed; width:80px; height:160px; pointer-events:none; z-index: 5; transform-origin: center center; opacity: 0.95; filter: drop-shadow(0px 15px 20px rgba(0,0,0,0.25));">
        <defs><radialGradient id="bodyGrad" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="#ffffff"/><stop offset="80%" stop-color="#f1f5f9"/><stop offset="100%" stop-color="#cbd5e1"/></radialGradient></defs>
        <path id="koi-fin-tail" d="M100,280 C130,330 140,380 100,390 C60,380 70,330 100,280 Z" fill="rgba(255,255,255,0.5)" stroke="#cbd5e1" stroke-width="1"/><path id="koi-fin-tail-2" d="M100,280 C115,320 120,360 100,380 C80,360 85,320 100,280 Z" fill="rgba(255,255,255,0.8)"/>
        <path id="koi-fin-chest-l" d="M70,120 C20,130 10,180 50,200 C60,180 65,150 70,120 Z" fill="rgba(255,255,255,0.6)" stroke="#cbd5e1" stroke-width="1"/><path id="koi-fin-chest-r" d="M130,120 C180,130 190,180 150,200 C140,180 135,150 130,120 Z" fill="rgba(255,255,255,0.6)" stroke="#cbd5e1" stroke-width="1"/>
        <path id="koi-fin-belly-l" d="M80,220 C50,240 50,270 75,260 Z" fill="rgba(255,255,255,0.6)"/><path id="koi-fin-belly-r" d="M120,220 C150,240 150,270 125,260 Z" fill="rgba(255,255,255,0.6)"/>
        <path id="koi-body" d="M100,20 C140,40 150,140 125,240 C110,290 100,300 100,300 C100,300 90,290 75,240 C50,140 60,40 100,20 Z" fill="url(#bodyGrad)"/>
        <path id="koi-mark-red-1" d="M100,20 C120,30 130,60 110,80 C90,100 70,80 80,40 C85,25 90,20 100,20 Z" fill="#ea580c"/><path id="koi-mark-red-2" d="M130,110 C145,130 140,170 115,190 C90,180 110,140 130,110 Z" fill="#ea580c"/><path id="koi-mark-red-3" d="M70,150 C90,140 100,170 85,210 C65,190 55,170 70,150 Z" fill="#ea580c"/><path id="koi-mark-red-4" d="M100,230 C120,240 115,270 100,280 C85,270 80,240 100,230 Z" fill="#ea580c"/>
        <path id="koi-mark-black-1" d="M80,90 C95,95 90,120 75,115 C65,105 70,90 80,90 Z" fill="#1e293b"/><path id="koi-mark-black-2" d="M120,190 C135,200 125,230 110,225 C100,210 110,195 120,190 Z" fill="#1e293b"/><path id="koi-mark-black-3" d="M85,215 C95,220 90,240 80,235 C75,225 80,215 85,215 Z" fill="#1e293b"/>
        <circle id="koi-eye-l" cx="75" cy="55" r="4" fill="#0f172a"/><circle id="koi-eye-l-iris" cx="74" cy="54" r="1.5" fill="#ffffff"/><circle id="koi-eye-r" cx="125" cy="55" r="4" fill="#0f172a"/><circle id="koi-eye-r-iris" cx="124" cy="54" r="1.5" fill="#ffffff"/>
        <path id="koi-whisker-l" d="M85,25 Q70,10 65,15" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/><path id="koi-whisker-r" d="M115,25 Q130,10 135,15" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
    </svg>

    <div id="loading-screen"><div class="loader"></div><p style="margin-top:20px; font-weight:900; color:var(--primary)">Loading PM Tasks...</p></div>

    <div id="auth-screen" class="auth-overlay" style="display:none;">
        <div class="auth-card" id="login-v"><h2 style="font-weight:900; font-size:2rem; color:#0f172a;">PM Tasks</h2><button class="google-login" onclick="window.login()"><svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Googleでログイン</button></div>
        <div class="auth-card" id="setup-v" style="display:none;"><h2 style="font-weight:900; color:#0f172a;">Profile Setup</h2><label class="profile-img-btn"><img id="setup-img" src="" alt="icon"><input type="file" accept="image/*" onchange="window.handleImageUpload(event, 'setup-img')"></label><input type="text" id="setup-n" style="width:100%; padding:12px; border-radius:10px; border:2px solid #f1f5f9; margin-bottom:20px; text-align:center; font-family:inherit; font-weight:800;" placeholder="なまえ"><div id="setup-colors" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:30px;"></div><button class="google-login" style="background:var(--primary); color:#fff;" onclick="window.finishSetup()">スタート！</button></div>
    </div>

    <div id="manager-m" class="modal-overlay" onclick="if(event.target==this)window.closeM('manager-m')">
        <div class="modal-content" style="padding:30px; height:auto; text-align:center;">
            <h2 style="margin:0 0 20px; font-weight:900;">メンバー権限</h2>
            <div id="manager-target-name" style="font-weight:800; margin-bottom: 20px; color: var(--primary); font-size: 1.2rem;"></div>
            <label style="display:flex; align-items:center; justify-content:center; gap:10px; font-weight:800; cursor:pointer;">
                <input type="checkbox" id="manager-checkbox" style="width:20px; height:20px;"> 責任者にする（すべてのタスクを管理）
            </label>
            <button class="add-btn" style="width:100%; padding:15px; margin-top:30px;" onclick="window.saveManager()">権限を更新する</button>
        </div>
    </div>

    <div id="profile-m" class="modal-overlay" onclick="if(event.target==this)window.closeM('profile-m')"><div class="modal-content" style="padding:30px; height:auto; text-align:center;"><h2 style="margin:0 0 20px; font-weight:900;">プロフィール編集</h2><label class="profile-img-btn"><img id="edit-img" src="" alt="icon"><input type="file" accept="image/*" onchange="window.handleImageUpload(event, 'edit-img')"></label><input type="text" id="edit-n" class="add-input" style="width:100%; box-sizing:border-box; margin-bottom:20px; text-align:center;" placeholder="表示名"><div id="edit-colors" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:30px;"></div><button class="add-btn" style="width:100%; padding:15px; margin-bottom:10px;" onclick="window.saveProfile()">保存する</button><button style="background:transparent; border:none; color:#f43f5e; font-weight:900; cursor:pointer; padding:10px;" onclick="window.logout()">ログアウト</button></div></div>

    <div class="top-bar">
        <select id="proj-sel" class="project-select" onchange="window.switchProj()"></select>
        <div style="display:flex; gap:8px;"><button class="add-btn" style="padding:8px 12px; font-size:0.75rem; background:#8b5cf6;" onclick="window.openM('invite-m')">招待</button><button class="add-btn" style="padding:8px 12px; font-size:0.75rem; background:#34d399;" onclick="window.openM('new-p-m')">＋ 新規PJ</button></div>
    </div>

    <header>
        <div class="header-titles">
            <h1 id="header-pj-name">Workspace</h1>
            <div id="mem-count" class="mem-list"></div>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="icon-btn" onclick="window.openProfile()"><img id="header-user-icon" src="" alt="👤"></button>
        </div>
    </header>

    <div id="dashboard" class="dashboard"></div>

    <div id="modal" class="modal-overlay" onclick="if(event.target==this)window.closeM('modal')"><div class="modal-content"><div class="modal-header"><input type="text" id="m-title" class="modal-title-input" onblur="window.saveName()"><button class="close-btn" onclick="window.closeM('modal')">✕</button></div><div id="active-task-list" class="task-list" style="margin-bottom: 0;"></div><div id="completed-task-section" style="padding: 0 24px 10px; flex-shrink: 0;"></div><div class="add-area"><select id="ass-sel" class="assign-sel"></select><input type="text" id="t-input" class="add-input" placeholder="タスクを追加 (Cmd+Enter)" onkeydown="if((event.metaKey || event.ctrlKey) && event.key === 'Enter') { window.addTask(); event.preventDefault(); }"><button class="add-btn" onclick="window.addTask()">追加</button></div><button style="color:#f43f5e; border:none; background:none; padding:15px; font-weight:900; cursor:pointer;" onclick="window.delBlock()">🗑 このカテゴリを削除</button></div></div>
    <div id="new-p-m" class="modal-overlay" onclick="if(event.target==this)window.closeM('new-p-m')"><div class="modal-content" style="padding:30px; height:auto;"><h2>新規PJ作成</h2><input type="text" id="new-p-t" class="add-input" style="width:100%; box-sizing:border-box; margin-bottom:20px;" placeholder="PJ名"><button class="add-btn" style="width:100%; padding:15px; background:#34d399;" onclick="window.createPJ()">作成</button></div></div>
    <div id="invite-m" class="modal-overlay" onclick="if(event.target==this)window.closeM('invite-m')"><div class="modal-content" style="padding:30px; height:auto;"><h2>招待</h2><input type="email" id="inv-e" class="add-input" style="width:100%; box-sizing:border-box; margin-bottom:20px;" placeholder="email@gmail.com"><button class="add-btn" style="width:100%; padding:15px; background:#8b5cf6;" onclick="window.sendInv()">招待を送る</button></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, setPersistence, browserLocalPersistence, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, onSnapshot, query, where, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAKBwm7j4-A__682dRZKXULXeLMX-zLPKE", authDomain: "pm-tasks-f9303.firebaseapp.com", projectId: "pm-tasks-f9303", storageBucket: "pm-tasks-f9303.firebasestorage.app", messagingSenderId: "87002903557", appId: "1:87002903557:web:e48d9ff3e807d7631a586c", measurementId: "G-S61N34YF93" };
        const app = initializeApp(firebaseConfig); 
        const auth = getAuth(app); 
        const db = getFirestore(app); 
        const provider = new GoogleAuthProvider();

        setPersistence(auth, browserLocalPersistence);
        getRedirectResult(auth).catch(error => { console.error("Login Error:", error); });

        let user = null, myP = null, pjs = [], curPId = null, curPD = null, curGId = null, curBId = null, tempPhoto = "";
        let isDraggingCircle = false; let showCompletedTasks = false; let memberProfiles = {};
        let lastClickX = window.innerWidth / 2; let lastClickY = window.innerHeight / 2;
        let targetManagerEmail = null;
        
        const colors = ["#38bdf8", "#fb7185", "#34d399", "#fbbf24", "#a78bfa", "#f472b6", "#fb923c", "#0f172a"];
        let selC = colors[0];
        
        window.openGroups = window.openGroups || new Set();

        function spawnRipple(x, y) {
            const numRings = Math.floor(Math.random() * 2) + 2; 
            const baseSize = 80 + Math.random() * 80; 
            const baseDuration = 1.0 + Math.random() * 0.5;

            for (let i = 0; i < numRings; i++) {
                const delay = i * 200 + Math.random() * 50; 
                const scaleModifier = 1 - (i * 0.1); 
                const durationModifier = 1 + (i * 0.2); 

                setTimeout(() => {
                    const ripple = document.createElement('div'); ripple.className = 'ripple'; 
                    ripple.style.left = x + 'px'; ripple.style.top = y + 'px';
                    const finalSize = baseSize * scaleModifier; const finalDuration = baseDuration * durationModifier;
                    ripple.style.width = finalSize + 'px'; ripple.style.height = finalSize + 'px'; 
                    ripple.style.animationDuration = finalDuration + 's';
                    
                    document.body.appendChild(ripple); setTimeout(() => ripple.remove(), finalDuration * 1000); 
                }, delay);
            }
        }

        document.addEventListener('click', (e) => { lastClickX = e.clientX; lastClickY = e.clientY; spawnRipple(e.clientX, e.clientY); });

        function buildColors(containerId) {
            const ctn = document.getElementById(containerId); ctn.innerHTML = '';
            colors.forEach(c => {
                const dv = document.createElement('div'); dv.className = 'color-opt'; dv.style.background = c;
                if(c == selC) dv.classList.add('selected');
                dv.onclick = () => { ctn.querySelectorAll('.color-opt').forEach(x=>x.classList.remove('selected')); dv.classList.add('selected'); selC = c; };
                ctn.appendChild(dv);
            });
        }

        window.handleImageUpload = (event, imgId) => {
            const file = event.target.files[0]; if(!file) return;
            const reader = new FileReader(); reader.onload = (e) => {
                const img = new Image(); img.onload = () => {
                    const canvas = document.createElement('canvas'); const size = 150; canvas.width = size; canvas.height = size;
                    const ctx = canvas.getContext('2d'); const min = Math.min(img.width, img.height);
                    ctx.drawImage(img, (img.width-min)/2, (img.height-min)/2, min, min, 0, 0, size, size);
                    tempPhoto = canvas.toDataURL('image/jpeg', 0.8); document.getElementById(imgId).src = tempPhoto;
                }; img.src = e.target.result;
            }; reader.readAsDataURL(file);
        };

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                user = u; const d = await getDoc(doc(db, "users", u.uid));
                if (d.exists()) { myP = d.data(); myP._isDummy = false; memberProfiles[user.email] = myP; updateHeaderIcon(); loadPJs(); } else { showSetup(); }
            } else { document.getElementById('auth-screen').style.display = 'flex'; hideLoading(); }
        });

        window.login = () => {
            const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            if (isPWA || isMobile) { signInWithRedirect(auth, provider); } else { signInWithPopup(auth, provider); }
        };
        
        window.logout = () => signOut(auth);

        function showSetup() { document.getElementById('auth-screen').style.display = 'flex'; document.getElementById('login-v').style.display = 'none'; document.getElementById('setup-v').style.display = 'block'; document.getElementById('setup-n').value = user.displayName; tempPhoto = user.photoURL || ""; document.getElementById('setup-img').src = tempPhoto; buildColors('setup-colors'); hideLoading(); }
        
        window.finishSetup = async () => { const name = document.getElementById('setup-n').value; if(!name) return alert("なまえ入力してね"); myP = { email: user.email, name, color: selC, photo: tempPhoto }; await setDoc(doc(db, "users", user.uid), myP); myP._isDummy = false; memberProfiles[user.email] = myP; await addDoc(collection(db, "projects"), { title: "My Tasks", members: [user.email], managers: [user.email], blocks: [], koiSize: 0.5 }); location.reload(); };
        
        window.openProfile = () => { document.getElementById('edit-n').value = myP.name; selC = myP.color || colors[0]; tempPhoto = myP.photo || ""; document.getElementById('edit-img').src = tempPhoto; buildColors('edit-colors'); window.openM('profile-m'); };
        window.saveProfile = async () => { const name = document.getElementById('edit-n').value; if(!name) return; myP.name = name; myP.color = selC; myP.photo = tempPhoto; await setDoc(doc(db, "users", user.uid), myP, {merge: true}); memberProfiles[user.email] = myP; updateHeaderIcon(); window.closeM('profile-m'); syncCurPJ(); };

        function updateHeaderIcon() { document.getElementById('header-user-icon').src = myP.photo || "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='%2338bdf8' viewBox='0 0 24 24'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>"; }

        async function fetchMemberProfiles() {
            if (!curPD || !curPD.members) return;
            let needsUpdate = false;
            for (const email of curPD.members) {
                if (!memberProfiles[email] || memberProfiles[email]._isDummy) {
                    const q = query(collection(db, "users"), where("email", "==", email));
                    const qs = await getDocs(q);
                    if (!qs.empty) {
                        memberProfiles[email] = qs.docs[0].data();
                        memberProfiles[email]._isDummy = false;
                        needsUpdate = true;
                    } else if (!memberProfiles[email]) {
                        memberProfiles[email] = { name: email.split('@')[0], color: '#94a3b8', _isDummy: true };
                        needsUpdate = true;
                    }
                }
            }
            if (needsUpdate) {
                updateHeaderMembers(); updateAssList(); renderDash();
                if(curBId) renderTasks();
            }
        }

        function loadPJs() {
            const q = query(collection(db, "projects"), where("members", "array-contains", user.email));
            onSnapshot(q, (sn) => {
                pjs = sn.docs.map(d => ({ id: d.id, data: d.data() }));
                updateProjList();
                const savedProjId = localStorage.getItem('last_proj_id');
                if (pjs.length > 0) {
                    if (savedProjId && pjs.find(p => p.id === savedProjId)) { curPId = savedProjId; } 
                    else if (!curPId || !pjs.find(p => p.id === curPId)) { curPId = pjs[0].id; }
                    document.getElementById('proj-sel').value = curPId;
                    syncCurPJ();
                }
                hideLoading();
            });
        }

        function syncCurPJ() {
            const p = pjs.find(x => x.id == curPId); if(!p) return;
            curPD = p.data;
            document.getElementById('header-pj-name').innerText = curPD.title;
            
            if (!curPD.managers) { curPD.managers = [curPD.members[0]]; save(); }

            kSize = curPD.koiSize || 0.5;

            updateHeaderMembers(); renderDash(); updateAssList();
            if(curBId) renderTasks();
            fetchMemberProfiles();
        }

        function updateHeaderMembers() { 
            const defaultIcon = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='%2394a3b8' viewBox='0 0 24 24'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>";
            const html = curPD.members.map(m => {
                const p = memberProfiles[m];
                const name = (p && !p._isDummy) ? p.name : m.split('@')[0] + " (待機)";
                const photo = (p && !p._isDummy && p.photo) ? p.photo : defaultIcon;
                const isMgr = curPD.managers.includes(m);
                const mgrCrown = isMgr ? '<span style="margin-left:2px;">🎐</span>' : '';
                return `<div onclick="window.openManagerModal('${m}')" style="display:inline-flex; align-items:center; gap:4px; margin-right:8px; background:rgba(255,255,255,0.6); padding:2px 8px 2px 2px; border-radius:20px; flex-shrink:0; border: 1px solid #fff; cursor:pointer;"><img src="${photo}" style="width:16px;height:16px;border-radius:50%;object-fit:cover;background:#fff;"><span>${name}${mgrCrown}</span></div>`;
            }).join('');
            document.getElementById('mem-count').innerHTML = html || "-";
        }

        window.openManagerModal = (email) => {
            if (!curPD.managers.includes(user.email)) {
                alert("責任者のみが権限を変更できます。"); return;
            }
            targetManagerEmail = email;
            const p = memberProfiles[email];
            document.getElementById('manager-target-name').innerText = (p && !p._isDummy) ? p.name : email;
            document.getElementById('manager-checkbox').checked = curPD.managers.includes(email);
            window.openM('manager-m');
        };

        window.saveManager = async () => {
            const isChecked = document.getElementById('manager-checkbox').checked;
            if (isChecked && !curPD.managers.includes(targetManagerEmail)) {
                curPD.managers.push(targetManagerEmail);
            } else if (!isChecked && curPD.managers.includes(targetManagerEmail)) {
                if (curPD.managers.length === 1 && curPD.managers[0] === targetManagerEmail) {
                    alert("最低1人は責任者が必要です！"); return;
                }
                curPD.managers = curPD.managers.filter(m => m !== targetManagerEmail);
            }
            await save(); window.closeM('manager-m'); updateHeaderMembers(); renderDash();
        };

        window.toggleGroup = (gId) => {
            if (window.openGroups.has(gId)) { window.openGroups.delete(gId); } 
            else { window.openGroups.add(gId); }
            renderDash();
        };

        function renderDash() {
            const el = document.getElementById('dashboard'); el.innerHTML = '';
            
            if (curPD.blocks && (!curPD.groups || curPD.groups.length === 0)) {
                const newId = Date.now().toString();
                curPD.groups = [{ id: newId, title: "メインエリア", blocks: curPD.blocks }];
                window.openGroups.add(newId); 
                delete curPD.blocks;
                save();
            }
            if (!curPD.groups) curPD.groups = [];

            const isMobile = window.innerWidth < 600;
            const gapSize = isMobile ? 12 : 20;
            const padTop = isMobile ? 15 : 30;
            const padBot = isMobile ? 45 : 40; 
            const padX = isMobile ? 10 : 24;
            
            el.style.gap = '15px';
            el.style.padding = `${padTop}px ${padX}px ${padBot}px`;
            
            const w = el.clientWidth - (padX * 2); 
            const headerHeight = 60;
            const h = el.clientHeight - (padTop + padBot) - (curPD.groups.length * headerHeight) - (curPD.groups.length * 15); 

            let totalOpenItems = 0;
            curPD.groups.forEach(g => {
                if (window.openGroups.has(g.id)) totalOpenItems += (g.blocks ? g.blocks.length : 0) + 1;
            });

            const rowHeightRatio = 1.18; 
            let opt = 0; 
            
            if (totalOpenItems > 0 && h > 50) {
                for(let c=1; c<=totalOpenItems; c++) { 
                    let r = Math.ceil(totalOpenItems/c); 
                    let s = Math.min((w-(c-1)*gapSize)/c, (h-(r-1)*gapSize)/(r * rowHeightRatio)); 
                    if(s > opt) opt = s; 
                }
            } else {
                opt = isMobile ? 80 : 110; 
            }
            
            const size = Math.max(Math.min(opt * 0.9, 130), 45); 
            const isManager = curPD.managers && curPD.managers.includes(user.email);
            const marginTopPx = size * (rowHeightRatio - 1); 

            curPD.groups.forEach(g => {
                const panel = document.createElement('div');
                panel.className = 'glass-panel';
                if (window.openGroups.has(g.id)) panel.classList.add('open');
                panel.dataset.id = g.id;

                let summaryHtml = '';
                let myUncompTotal = 0;
                const colorCountsTotal = {};

                if (!g.blocks) g.blocks = [];
                g.blocks.forEach(b => {
                    (b.items || []).filter(i => !i.completed).forEach(i => {
                        if (isManager) {
                            const p = memberProfiles[i.assEmail];
                            const c = (p && !p._isDummy) ? p.color : (i.assColor || '#94a3b8');
                            colorCountsTotal[c] = (colorCountsTotal[c] || 0) + 1;
                        } else {
                            if (i.assEmail === user.email) myUncompTotal++;
                        }
                    });
                });

                if (isManager) {
                    Object.keys(colorCountsTotal).forEach(c => {
                        summaryHtml += `<div style="width:20px;height:20px;font-size:10px;color:#fff;font-weight:900;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;background:${c}; margin-left:-6px;">${colorCountsTotal[c]}</div>`;
                    });
                } else if (myUncompTotal > 0) {
                    summaryHtml = `<div style="width:20px;height:20px;font-size:10px;color:#fff;font-weight:900;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;background:${myP.color}; margin-left:-6px;">${myUncompTotal}</div>`;
                }

                const header = document.createElement('div');
                header.className = 'panel-header';
                header.onclick = () => window.toggleGroup(g.id);
                header.innerHTML = `
                    <div style="display:flex; align-items:center; width:60%;">
                        <span class="toggle-icon">▶</span>
                        <input type="text" value="${g.title}" onblur="window.updateGroupName('${g.id}', this.value)" onclick="event.stopPropagation();" class="panel-title">
                    </div>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div style="display:flex; padding-left: 6px;">${summaryHtml}</div>
                        <button class="del-group-btn" onclick="event.stopPropagation(); window.delGroup('${g.id}')">✕</button>
                    </div>
                `;
                panel.appendChild(header);

                const circlesContainer = document.createElement('div');
                circlesContainer.className = 'panel-circles';
                
                g.blocks.forEach(b => {
                    const div = document.createElement('div'); div.className = 'circle-block';
                    div.dataset.id = b.id;
                    div.style.width = div.style.height = size + 'px'; div.style.borderColor = b.color;
                    div.style.borderWidth = Math.max(2, size*0.03) + 'px'; 
                    div.style.marginTop = marginTopPx + 'px'; 
                    
                    div.onclick = () => { if(isDraggingCircle) return; div.classList.add('jelly-anim'); setTimeout(() => { div.classList.remove('jelly-anim'); window.openTaskM(g.id, b.id); }, 250); };
                    
                    div.innerHTML = `<div class="circle-title" style="font-size:${Math.max(10, size*0.14)}px">${b.title}</div>`;
                    
                    const badgeContainer = document.createElement('div');
                    badgeContainer.style.position = 'absolute'; badgeContainer.style.top = '0'; badgeContainer.style.left = '50%';
                    badgeContainer.style.transform = 'translate(-50%, -50%)'; badgeContainer.style.display = 'flex';
                    badgeContainer.style.gap = '2px'; badgeContainer.style.zIndex = '2'; badgeContainer.style.pointerEvents = 'none';

                    const badgeSize = Math.max(16, size*0.28); 
                    const badgeFontSize = Math.max(9, size*0.14);

                    if (isManager) {
                        const colorCounts = {};
                        (b.items || []).filter(i => !i.completed).forEach(i => {
                            const p = memberProfiles[i.assEmail];
                            const c = (p && !p._isDummy) ? p.color : (i.assColor || '#94a3b8');
                            colorCounts[c] = (colorCounts[c] || 0) + 1;
                        });
                        Object.keys(colorCounts).forEach(c => {
                            const bg = document.createElement('div');
                            bg.style.width = badgeSize + 'px'; bg.style.height = badgeSize + 'px';
                            bg.style.fontSize = badgeFontSize + 'px'; bg.style.color = '#fff'; bg.style.fontWeight = '900';
                            bg.style.borderRadius = '50%'; bg.style.display = 'flex'; bg.style.alignItems = 'center';
                            bg.style.justifyContent = 'center'; bg.style.border = '2px solid #fff'; bg.style.background = c;
                            bg.innerText = colorCounts[c]; badgeContainer.appendChild(bg);
                        });
                    } else {
                        const myUncompleted = (b.items || []).filter(i => !i.completed && i.assEmail === user.email).length;
                        if (myUncompleted > 0) {
                            const bg = document.createElement('div');
                            bg.style.width = badgeSize + 'px'; bg.style.height = badgeSize + 'px';
                            bg.style.fontSize = badgeFontSize + 'px'; bg.style.color = '#fff'; bg.style.fontWeight = '900';
                            bg.style.borderRadius = '50%'; bg.style.display = 'flex'; bg.style.alignItems = 'center';
                            bg.style.justifyContent = 'center'; bg.style.border = '2px solid #fff'; bg.style.background = myP.color;
                            bg.innerText = myUncompleted; badgeContainer.appendChild(bg);
                        }
                    }
                    
                    if (badgeContainer.children.length > 0) div.appendChild(badgeContainer);
                    circlesContainer.appendChild(div);
                });

                const add = document.createElement('div'); add.className = 'circle-block add-new'; add.style.width = add.style.height = size + 'px'; add.innerHTML = `<span style="font-size:${Math.max(16, size*0.4)}px; color:var(--primary)">＋</span>`; add.onclick = () => window.addBlock(g.id); add.style.marginTop = marginTopPx + 'px'; circlesContainer.appendChild(add);

                panel.appendChild(circlesContainer);
                el.appendChild(panel);

                if(window['sortable_' + g.id]) window['sortable_' + g.id].destroy(); 
                window['sortable_' + g.id] = Sortable.create(circlesContainer, { 
                    group: 'shared-circles', animation: 250, delay: 150, delayOnTouchOnly: true, fallbackOnBody: true, filter: '.add-new', 
                    onStart: () => { isDraggingCircle = true; }, 
                    onEnd: async (e) => { 
                        setTimeout(() => { isDraggingCircle = false; }, 50); 
                        if (e.from === e.to && e.oldIndex === e.newIndex) return; 

                        const fromGId = e.from.parentElement.dataset.id;
                        const toGId = e.to.parentElement.dataset.id;
                        const fromG = curPD.groups.find(x => x.id === fromGId);
                        const toG = curPD.groups.find(x => x.id === toGId);

                        const moved = fromG.blocks.splice(e.oldIndex, 1)[0]; 
                        toG.blocks.splice(e.newIndex, 0, moved); 
                        
                        await save(); renderDash();
                    } 
                });
            });

            const addGroupBtn = document.createElement('div');
            addGroupBtn.className = 'add-new-group';
            addGroupBtn.innerHTML = `＋ 新しい島を追加`;
            addGroupBtn.onclick = window.addGroup;
            el.appendChild(addGroupBtn);

            if(window.dashSortable) window.dashSortable.destroy(); 
            window.dashSortable = Sortable.create(el, { 
                animation: 250, delay: 150, delayOnTouchOnly: true, fallbackOnBody: true, filter: '.add-new-group', 
                onStart: () => { isDraggingCircle = true; }, 
                onEnd: async (e) => { 
                    setTimeout(() => { isDraggingCircle = false; }, 50); 
                    if(e.oldIndex === e.newIndex) return; 
                    const moved = curPD.groups.splice(e.oldIndex, 1)[0]; 
                    curPD.groups.splice(e.newIndex, 0, moved); 
                    await save(); 
                } 
            });
        }

        window.addGroup = async () => {
            const id = Date.now().toString();
            curPD.groups.push({ id, title: "新しい島", blocks: [] });
            window.openGroups.add(id);
            await save(); renderDash();
        };

        window.updateGroupName = async (gId, val) => {
            const g = curPD.groups.find(x => x.id == gId);
            if(g.title != val) { g.title = val; await save(); }
        };

        window.delGroup = async (gId) => {
            const g = curPD.groups.find(x => x.id == gId);
            if(g.blocks && g.blocks.length > 0) {
                alert("島の中にタスクがあるため削除できません。先にタスクを移動してください。"); return;
            }
            if(!confirm("この島を削除しますか？")) return;
            curPD.groups = curPD.groups.filter(x => x.id != gId);
            await save(); renderDash();
        };

        window.openTaskM = (gId, bId) => { curGId = gId; curBId = bId; const g = curPD.groups.find(x=>x.id==gId); const b = g.blocks.find(x=>x.id==bId); document.getElementById('m-title').value = b.title; document.getElementById('m-title').style.color = b.color; showCompletedTasks = false; renderTasks(); window.openM('modal'); };
        
        function createTaskDom(item) { 
            const div = document.createElement('div'); div.className = `task-item ${item.completed ? 'completed' : ''}`; 
            const p = memberProfiles[item.assEmail];
            const displayName = (p && !p._isDummy) ? p.name : item.assName; 
            const displayColor = (p && !p._isDummy) ? p.color : (item.assColor || '#94a3b8'); 
            const defaultIcon = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='%23ffffff' viewBox='0 0 24 24'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>";
            const displayPhoto = (p && !p._isDummy && p.photo) ? p.photo : defaultIcon;

            div.innerHTML = `<div class="drag-handle" style="${item.completed ? 'visibility:hidden;' : ''}">≡</div>
                             <input type="checkbox" class="task-checkbox" ${item.completed?'checked':''} onchange="window.toggleT('${item.id}', '${displayColor}')">
                             <div class="task-content"><div class="task-text" contenteditable="${!item.completed}" onblur="window.editT('${item.id}', this.innerText)">${item.text}</div>
                             <span class="task-tag" style="background:${displayColor}"><img src="${displayPhoto}" style="width:14px;height:14px;border-radius:50%;object-fit:cover;background:rgba(255,255,255,0.3);"> ${displayName}</span></div>
                             <button style="border:none; background:none; cursor:pointer; font-size:1.2rem; color:#cbd5e1;" onclick="window.delT('${item.id}')">✕</button>`; 
            return div; 
        }

        function renderTasks() { 
            const g = curPD.groups.find(x=>x.id==curGId); 
            const b = g.blocks.find(x=>x.id==curBId); 
            const activeContainer = document.getElementById('active-task-list'); 
            const compSection = document.getElementById('completed-task-section'); 
            activeContainer.innerHTML = ''; compSection.innerHTML = ''; 
            if(!b.items) b.items = []; 
            
            const isManager = curPD.managers && curPD.managers.includes(user.email);
            let visibleTasks = isManager ? b.items : b.items.filter(i => i.assEmail === user.email);

            const activeTasks = visibleTasks.filter(i => !i.completed); 
            const completedTasks = visibleTasks.filter(i => i.completed); 
            
            activeTasks.forEach(item => activeContainer.appendChild(createTaskDom(item))); 
            
            if(completedTasks.length > 0) { 
                const btn = document.createElement('button'); btn.className = 'toggle-completed-btn'; btn.innerText = showCompletedTasks ? '完了したタスクを隠す ∧' : `完了したタスクを表示 (${completedTasks.length}) ∨`; btn.onclick = () => { showCompletedTasks = !showCompletedTasks; renderTasks(); }; compSection.appendChild(btn); 
                if(showCompletedTasks) { const compContainer = document.createElement('div'); completedTasks.forEach(item => compContainer.appendChild(createTaskDom(item))); compSection.appendChild(compContainer); } 
            } 
            
            if(window.taskSortable) window.taskSortable.destroy(); 
            window.taskSortable = Sortable.create(activeContainer, { 
                animation: 150, handle: '.drag-handle', delay: 150, delayOnTouchOnly: true, fallbackOnBody: true,
                onEnd: async (e) => { 
                    if(e.oldIndex === e.newIndex) return; 
                    const moved = activeTasks.splice(e.oldIndex, 1)[0]; 
                    activeTasks.splice(e.newIndex, 0, moved); 
                    
                    let activeIdx = 0;
                    b.items = b.items.map(item => {
                        const isVisibleActive = isManager ? !item.completed : (!item.completed && item.assEmail === user.email);
                        if (isVisibleActive) return activeTasks[activeIdx++];
                        return item;
                    });
                    await save(); 
                } 
            }); 
        }

        window.addTask = async () => { const input = document.getElementById('t-input'), text = input.value.trim(); if(!text) return; const assE = document.getElementById('ass-sel').value; const profile = memberProfiles[assE] || { name: assE.split('@')[0], color: '#94a3b8' }; const g = curPD.groups.find(x=>x.id==curGId); const b = g.blocks.find(x=>x.id==curBId); if(!b.items) b.items = []; b.items.unshift({ id: Date.now().toString(), text, completed: false, assName: profile.name, assEmail: assE, assColor: profile.color }); input.value = ''; await save(); };
        
        window.toggleT = async (tid, color) => { 
            const g = curPD.groups.find(x=>x.id==curGId); 
            const b = g.blocks.find(x=>x.id==curBId); 
            const i = b.items.find(x=>x.id==tid); 
            const wasCompleted = i.completed;
            i.completed = !i.completed; 
            if (!wasCompleted && i.completed) { spawnFood(lastClickX, lastClickY, color); } 
            
            b.items = b.items.filter(x => x.id !== tid);
            if (i.completed) {
                b.items.push(i);
            } else {
                b.items.unshift(i);
            }
            await save(); renderDash(); 
        };

        window.editT = async (tid, txt) => { const g = curPD.groups.find(x=>x.id==curGId); const b = g.blocks.find(x=>x.id==curBId); const i = b.items.find(x=>x.id==tid); if(i.text != txt){ i.text = txt; await save(); } };
        window.delT = async (tid) => { const g = curPD.groups.find(x=>x.id==curGId); const b = g.blocks.find(x=>x.id==curBId); b.items = b.items.filter(x=>x.id!=tid); await save(); renderDash(); };
        window.saveName = async () => { const g = curPD.groups.find(x=>x.id==curGId); const b = g.blocks.find(x=>x.id==curBId); const val = document.getElementById('m-title').value; if(b.title != val) { b.title = val; await save(); } };
        
        window.addBlock = async (gId) => {
            const id = Date.now().toString();
            const g = curPD.groups.find(x => x.id == gId);
            g.blocks.push({ id, title: "新しいカテゴリ", color: myP.color, items: [] });
            await save(); window.openTaskM(gId, id);
        };

        window.createPJ = async () => { const t = document.getElementById('new-p-t').value; if(!t) return; await addDoc(collection(db, "projects"), { title: t, members: [user.email], managers: [user.email], groups: [{id: Date.now().toString(), title: "メインエリア", blocks: []}], koiSize: 0.5 }); window.closeM('new-p-m'); };
        
        window.sendInv = async () => { const e = document.getElementById('inv-e').value; if(!e) return; if(!curPD.members.includes(e)) { curPD.members.push(e); await save(); alert("招待しました"); } window.closeM('invite-m'); };
        
        window.switchProj = () => { curPId = document.getElementById('proj-sel').value; localStorage.setItem('last_proj_id', curPId); syncCurPJ(); };
        async function save() { await setDoc(doc(db, "projects", curPId), curPD); }
        
        window.openM = (id) => document.getElementById(id).classList.add('active');
        window.closeM = (id) => { document.getElementById(id).classList.remove('active'); if(id=='modal'){ curGId=null; curBId=null; } };
        function hideLoading() { document.getElementById('loading-screen').style.opacity = '0'; setTimeout(() => document.getElementById('loading-screen').style.display='none', 500); }
        window.addEventListener('resize', renderDash);
        
        function updateProjList() { const sel = document.getElementById('proj-sel'); sel.innerHTML = ''; pjs.forEach(p => { const o = document.createElement('option'); o.value = p.id; o.innerText = p.data.title; sel.appendChild(o); }); sel.value = curPId; }
        
        function updateAssList() { 
            const sel = document.getElementById('ass-sel'); sel.innerHTML = ''; 
            curPD.members.forEach(m => { 
                const p = memberProfiles[m]; 
                const name = (p && !p._isDummy) ? p.name : m.split('@')[0] + " (待機中)"; 
                const o = document.createElement('option'); o.value = m; o.innerText = name; sel.appendChild(o); 
            }); 
            if(curPD.members.includes(user.email)) sel.value = user.email; 
        }

        function getScreenScale() { if (window.innerWidth < 500) return 0.7; if (window.innerWidth < 800) return 0.85; return 1.0; }

        const KOI_BASE_SPEED = 0.6; const KOI_CHASE_SPEED = 3.0; const KOI_TURN_SOFTNESS = 0.02; const SWAY_AMP = 0.1; const SWAY_FREQ = 0.004;
        let koiEl = document.getElementById('koi-fish'); let kX = window.innerWidth / 2, kY = window.innerHeight / 2; let kAngle = 0, kSize = 0.5; let speed = KOI_BASE_SPEED; let currentTarget = null; let foods = [];
        
        function spawnFood(x, y, color) { const food = document.createElement('div'); food.className = 'fish-food'; food.style.left = x + 'px'; food.style.top = y + 'px'; food.style.backgroundColor = color || '#ffcc00'; document.body.appendChild(food); foods.push({ el: food, x, y }); }
        
        function updateKoi() {
            if (!koiEl) return;

            let massFactor = Math.sqrt(0.5 / Math.max(0.5, kSize));
            let currentBaseSpeed = KOI_BASE_SPEED * massFactor; let currentChaseSpeed = KOI_CHASE_SPEED * massFactor; let currentTurnSoftness = KOI_TURN_SOFTNESS * massFactor; let currentSwayFreq = SWAY_FREQ * massFactor;
            
            if (foods.length > 0) {
                currentTurnSoftness *= 3.0; 
            }
            
            let tx, ty;
            
            if (foods.length > 0) {
                tx = foods[0].x; ty = foods[0].y; speed = currentChaseSpeed; 
            } else {
                if (!currentTarget || Math.random() < 0.003) { currentTarget = { x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight }; }
                tx = currentTarget.x; ty = currentTarget.y; speed = currentBaseSpeed; 
            }

            let dx = tx - kX; let dy = ty - kY; let dist = Math.sqrt(dx*dx + dy*dy);
            
            let currentScreenScale = getScreenScale();
            let hitRadius = Math.max(40, 40 * kSize * currentScreenScale);

            if (foods.length > 0 && dist < hitRadius) {
                let f = foods.shift(); f.el.remove();
                
                kSize += 0.05;
                if (curPD) { curPD.koiSize = kSize; save(); }
                spawnRipple(kX, kY);
            }

            if (dist > speed) {
                let targetAngle = Math.atan2(dy, dx); let deltaAngle = targetAngle - kAngle;
                while (deltaAngle > Math.PI) deltaAngle -= Math.PI * 2; while (deltaAngle < -Math.PI) deltaAngle += Math.PI * 2;
                kAngle += deltaAngle * currentTurnSoftness; 
                kX += Math.cos(kAngle) * speed; kY += Math.sin(kAngle) * speed;
            }

            let baseDisplayAngle = kAngle + (Math.PI / 2);
            let bodySway = Math.sin(Date.now() * currentSwayFreq) * SWAY_AMP * (speed / currentBaseSpeed);
            let finalAngle = baseDisplayAngle + bodySway;

            let finSway = Math.sin(Date.now() * currentSwayFreq * 1.5) * 15 * (speed / currentBaseSpeed); 
            let tailSway = Math.sin(Date.now() * currentSwayFreq - 1.0) * 25 * (speed / currentBaseSpeed);

            document.getElementById('koi-fin-chest-l').setAttribute('transform', `rotate(${finSway}, 70, 120)`);
            document.getElementById('koi-fin-chest-r').setAttribute('transform', `rotate(${-finSway}, 130, 120)`);
            document.getElementById('koi-fin-tail').setAttribute('transform', `rotate(${tailSway}, 100, 280)`);
            document.getElementById('koi-fin-tail-2').setAttribute('transform', `rotate(${tailSway}, 100, 280)`);

            koiEl.style.left = kX + 'px'; koiEl.style.top = kY + 'px';
            koiEl.style.transform = `translate(-50%, -50%) scale(${kSize * currentScreenScale}) rotate(${finalAngle}rad)`;

            requestAnimationFrame(updateKoi);
        }
        
        updateKoi();

    </script>
</body>
</html>
