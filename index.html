<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PM CORE - Team Color Edition</title>
    <style>
        /* =========================================
           CSS Variables & Base Styles
        ========================================= */
        :root {
            --bg-gradient-1: #f0f9ff; --bg-gradient-2: #e0f2fe; --bg-gradient-3: #bae6fd;
            --surface-white: rgba(255, 255, 255, 0.85); --surface-solid: #ffffff;
            --text-heading: #0f172a; --text-body: #334155; --text-muted: #64748b;
            --border-soft: rgba(255, 255, 255, 0.8);
            --shadow-soft: 0 10px 30px -5px rgba(2, 132, 199, 0.15);
            --radius-xl: 32px; --radius-lg: 20px; --radius-md: 12px;
        }

        @keyframes softSky { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            margin: 0; padding: 0; color: var(--text-body);
            background: linear-gradient(-45deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3), var(--bg-gradient-1));
            background-size: 300% 300%; animation: softSky 20s ease-in-out infinite;
            display: flex; flex-direction: column; height: 100dvh; 
            -webkit-font-smoothing: antialiased; overflow: hidden; overscroll-behavior-y: none;
        }

        /* =========================================
           Member Bar (New)
        ========================================= */
        .member-bar {
            display: flex; gap: 8px; padding: 10px 24px 0; overflow-x: auto; flex-shrink: 0;
        }
        .member-bar::-webkit-scrollbar { display: none; }
        .member-chip {
            padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 800;
            background: var(--surface-white); border: 1px solid var(--border-soft);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); white-space: nowrap;
        }

        /* =========================================
           Header
        ========================================= */
        header { padding: 15px 24px 10px; z-index: 10; display: flex; justify-content: space-between; align-items: flex-start; flex-shrink: 0; }
        .header-titles h1 { margin: 0; font-size: 1.6rem; font-weight: 800; color: #0284c7; letter-spacing: 0.5px; }
        .header-titles p { margin: 2px 0 0; font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }
        
        .weather-settings-btn { background: var(--surface-white); border: 1px solid var(--border-soft); color: var(--text-muted); width: 36px; height: 36px; border-radius: 50%; font-size: 1rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* =========================================
           Register Modal
        ========================================= */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-gradient-1); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-content { background: #fff; padding: 30px; border-radius: var(--radius-xl); width: 85%; max-width: 320px; text-align: center; box-shadow: var(--shadow-soft); }
        .color-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; }
        .color-option { height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.2s; }
        .color-option.selected { border-color: #0f172a; transform: scale(1.1); }

        /* =========================================
           Circle Blocks
        ========================================= */
        .dashboard { display: flex; flex-wrap: wrap; padding: 10px 24px 30px; justify-content: center; align-items: center; align-content: center; flex-grow: 1; overflow: hidden; }
        .circle-block { 
            position: relative; border-radius: 50%; background: var(--surface-white); 
            border: 3px solid transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; cursor: pointer; 
            box-shadow: var(--shadow-soft); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); flex-shrink: 0; 
        }
        .circle-title { font-weight: 800; color: var(--text-heading); line-height: 1.2; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; word-break: break-all; padding: 0 10%; }
        .circle-creator { font-size: 0.65rem; font-weight: 800; margin-top: 4px; opacity: 0.9; }
        .badge { position: absolute; top: 0; right: 0; transform: translate(25%, -25%); color: #fff; font-weight: 800; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; z-index: 2; }

        /* =========================================
           Modal General
        ========================================= */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.2); backdrop-filter: blur(4px); display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: 0.4s; z-index: 1000; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: #fff; width: 100%; height: 85vh; border-radius: var(--radius-xl) var(--radius-xl) 0 0; display: flex; flex-direction: column; transform: translateY(100%); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-drag-area { padding: 15px 0; cursor: grab; display: flex; justify-content: center; flex-shrink: 0; }
        .modal-handle { width: 40px; height: 5px; background: #cbd5e1; border-radius: 3px; }
        .modal-header { padding: 0 24px 20px; display: flex; justify-content: space-between; align-items: center; }
        .modal-title-input { border: none; font-size: 1.4rem; font-weight: 800; width: 100%; outline: none; }

        /* =========================================
           Task List Items
        ========================================= */
        .task-list-container { padding: 0 24px 24px; overflow-y: auto; flex-grow: 1; }
        .task-item { display: flex; align-items: flex-start; padding: 16px; margin-bottom: 12px; background: #f8fafc; border-radius: var(--radius-lg); border: 1px solid #f1f5f9; }
        .task-checkbox { appearance: none; width: 22px; height: 22px; border-radius: 50%; margin-right: 15px; cursor: pointer; position: relative; flex-shrink: 0; border: 2px solid #cbd5e1; }
        .task-checkbox:checked::after { content: '✔'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 12px; }
        .task-content { flex-grow: 1; display: flex; flex-direction: column; }
        .task-text { outline: none; line-height: 1.4; font-weight: 600; color: var(--text-heading); }
        .task-info { display: flex; gap: 8px; margin-top: 6px; }
        .task-tag { font-size: 0.65rem; font-weight: 800; padding: 2px 8px; border-radius: 10px; color: #fff; }

        /* 天気・入力欄など(共通) */
        .weather-banner-container { margin: 0 24px 10px; display: none; }
        .w-matrix { width: 100%; background: #fff; border-radius: var(--radius-lg); overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow-soft); border: 1px solid #bae6fd; }
        .w-matrix-row { display: flex; border-bottom: 1px solid #f1f5f9; }
        .w-matrix-cell { flex: 1; padding: 8px 4px; text-align: center; font-size: 0.75rem; }
        .add-task-area { display: flex; margin-top: 20px; gap: 10px; padding: 0 24px 24px; }
        .add-task-input { flex-grow: 1; padding: 14px; border: none; background: #f1f5f9; border-radius: var(--radius-md); outline: none; font-weight: 600; }
        .add-task-btn { padding: 0 20px; border: none; border-radius: var(--radius-md); font-weight: 800; cursor: pointer; color: #fff; }
    </style>
</head>
<body>

    <div class="member-bar" id="member-bar"></div>

    <div class="login-overlay" id="login-modal" style="display: none;">
        <div class="login-content">
            <h2>プロフィール登録</h2>
            <div class="color-picker" id="color-picker">
                <div class="color-option" style="background:#38bdf8" data-color="#38bdf8"></div>
                <div class="color-option" style="background:#fb7185" data-color="#fb7185"></div>
                <div class="color-option" style="background:#34d399" data-color="#34d399"></div>
                <div class="color-option" style="background:#fbbf24" data-color="#fbbf24"></div>
                <div class="color-option" style="background:#a78bfa" data-color="#a78bfa"></div>
                <div class="color-option" style="background:#f472b6" data-color="#f472b6"></div>
                <div class="color-option" style="background:#607274" data-color="#607274"></div>
                <div class="color-option" style="background:#0f172a" data-color="#0f172a"></div>
            </div>
            <input type="text" id="user-name-input" placeholder="名前を入力（例：山田）">
            <button id="login-submit-btn">はじめる</button>
        </div>
    </div>

    <header>
        <div class="header-titles">
            <h1 id="header-name">PM Tasks</h1>
            <p id="sync-status">📡 Connecting...</p>
        </div>
        <button class="weather-settings-btn" onclick="window.openWeatherSettings()">⚙️</button>
    </header>

    <div class="weather-banner-container" id="weather-banner"></div>
    <div class="dashboard" id="dashboard"></div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content" id="modal-content">
            <div class="modal-drag-area" id="modal-drag"><div class="modal-handle"></div></div>
            <div class="modal-header">
                <input type="text" class="modal-title-input" id="modal-title">
                <button class="close-btn" onclick="window.closeModal('modal')">✕</button>
            </div>
            <div class="task-list-container" id="active-tasks"></div>
            <div class="add-task-area">
                <input type="text" class="add-task-input" id="new-task-input" placeholder="新しいタスクを入力...">
                <button class="add-task-btn" id="add-task-submit" onclick="window.addTask()">追加</button>
            </div>
            <button style="color:#e11d48; border:none; background:none; padding:20px; font-weight:800; cursor:pointer;" onclick="window.deleteCurrentBlock()">このカテゴリを削除</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKBwm7j4-A__682dRZKxULXeLMX-zLPKE",
            authDomain: "pm-tasks-f9303.firebaseapp.com",
            projectId: "pm-tasks-f9303",
            storageBucket: "pm-tasks-f9303.firebasestorage.app",
            messagingSenderId: "87002903557",
            appId: "1:87002903557:web:e48d9ff3e807d7631a586c",
            measurementId: "G-S61N34YF93"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "pm_app", "main_team");

        let blocks = [];
        let members = [];
        let myName = localStorage.getItem('pm_user_name');
        let myColor = localStorage.getItem('pm_user_color') || "#38bdf8";
        let currentBlockId = null;

        // ==========================================
        // ユーザー登録処理
        // ==========================================
        const colorOptions = document.querySelectorAll('.color-option');
        colorOptions.forEach(opt => {
            if(opt.dataset.color === myColor) opt.classList.add('selected');
            opt.onclick = () => {
                colorOptions.forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                myColor = opt.dataset.color;
            };
        });

        document.getElementById('login-submit-btn').onclick = () => {
            const val = document.getElementById('user-name-input').value.trim();
            if(!val) return alert("名前を入れてね");
            myName = val;
            localStorage.setItem('pm_user_name', myName);
            localStorage.setItem('pm_user_color', myColor);
            document.getElementById('login-modal').style.display = 'none';
            registerMemberToCloud();
            startApp();
        };

        if(!myName) {
            document.getElementById('login-modal').style.display = 'flex';
        } else {
            registerMemberToCloud();
            startApp();
        }

        function registerMemberToCloud() {
            // メンバーリストを更新（簡易的な重複排除）
            const exists = members.find(m => m.name === myName);
            if(!exists) {
                members.push({ name: myName, color: myColor });
                saveDataToCloud();
            }
        }

        // ==========================================
        // Firebase 同期
        // ==========================================
        function startApp() {
            document.getElementById('header-name').innerText = `Hello, ${myName}`;
            onSnapshot(docRef, (snap) => {
                if(snap.exists()) {
                    const data = snap.data();
                    blocks = data.blocks || [];
                    members = data.members || [];
                } else {
                    blocks = [];
                    members = [{ name: myName, color: myColor }];
                    saveDataToCloud();
                }
                renderDashboard();
                renderMemberBar();
                if(currentBlockId) renderTasks();
                document.getElementById('sync-status').innerText = "☁️ Team Synced";
            });
        }

        function saveDataToCloud() {
            setDoc(docRef, { blocks, members }, { merge: true });
        }

        // ==========================================
        // UI レンダリング
        // ==========================================
        function renderMemberBar() {
            const bar = document.getElementById('member-bar');
            bar.innerHTML = '';
            members.forEach(m => {
                const chip = document.createElement('div');
                chip.className = 'member-chip';
                chip.style.color = m.color;
                chip.style.borderColor = m.color;
                chip.innerText = m.name;
                bar.appendChild(chip);
            });
        }

        function renderDashboard() {
            const dashboardEl = document.getElementById('dashboard');
            dashboardEl.innerHTML = '';
            const w = dashboardEl.clientWidth - 48;
            const h = dashboardEl.clientHeight - 40;
            if(w <= 0 || h <= 0) return;

            const total = blocks.length + 1;
            let optSize = 0;
            for(let c=1; c<=total; c++){
                let r = Math.ceil(total/c);
                let size = Math.min((w - (c-1)*12)/c, (h - (r-1)*12)/r);
                if(size > optSize) optSize = size;
            }
            let baseSize = Math.min(Math.max(optSize, 50), 140);

            blocks.forEach(b => {
                const uncompleted = b.items.filter(i => !i.completed).length;
                const circle = document.createElement('div');
                circle.className = 'circle-block';
                circle.style.width = circle.style.height = `${baseSize}px`;
                circle.style.borderColor = b.color || myColor;
                circle.onclick = () => window.openTaskModal(b.id);

                const title = document.createElement('div');
                title.className = 'circle-title';
                title.style.fontSize = `${baseSize * 0.14}px`;
                title.innerText = b.title;
                circle.appendChild(title);

                const creator = document.createElement('div');
                creator.className = 'circle-creator';
                creator.style.color = b.color || myColor;
                creator.innerText = `by ${b.userName}`;
                circle.appendChild(creator);

                if(uncompleted > 0) {
                    const badge = document.createElement('div');
                    badge.className = 'badge';
                    const bs = Math.max(20, baseSize * 0.3);
                    badge.style.width = badge.style.height = `${bs}px`;
                    badge.style.background = b.color || myColor;
                    badge.style.fontSize = `${bs * 0.5}px`;
                    badge.innerText = uncompleted;
                    circle.appendChild(badge);
                }
                dashboardEl.appendChild(circle);
            });

            const add = document.createElement('div');
            add.className = 'circle-block add-new';
            add.style.width = add.style.height = `${baseSize}px`;
            add.innerHTML = `<span style="font-size:2rem; color:${myColor}">＋</span>`;
            add.onclick = window.addNewBlock;
            dashboardEl.appendChild(add);
        }

        // ==========================================
        // モーダル操作 & タスク処理
        // ==========================================
        window.addNewBlock = () => {
            const id = Date.now().toString();
            blocks.push({ id, title: "新規カテゴリ", userName: myName, color: myColor, items: [] });
            saveDataToCloud();
            window.openTaskModal(id);
        };

        window.openTaskModal = (id) => {
            currentBlockId = id;
            const b = blocks.find(x => x.id === id);
            const titleInput = document.getElementById('modal-title');
            titleInput.value = b.title;
            titleInput.style.color = b.color;
            document.getElementById('add-task-submit').style.background = b.color;
            renderTasks();
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        function renderTasks() {
            const b = blocks.find(x => x.id === currentBlockId);
            const container = document.getElementById('active-tasks');
            container.innerHTML = '';
            b.items.forEach(item => {
                const div = document.createElement('div');
                div.className = `task-item ${item.completed ? 'completed' : ''}`;
                
                const cb = document.createElement('input');
                cb.type = 'checkbox'; cb.className = 'task-checkbox';
                cb.checked = item.completed;
                cb.style.backgroundColor = item.completed ? item.color : 'transparent';
                cb.style.borderColor = item.color;
                cb.onchange = () => { item.completed = cb.checked; saveDataToCloud(); };

                const content = document.createElement('div');
                content.className = 'task-content';
                content.innerHTML = `<div class="task-text" contenteditable="true">${item.text}</div>
                                     <div class="task-info"><span class="task-tag" style="background:${item.color}">${item.userName}</span></div>`;
                
                // 文字修正の同期
                content.querySelector('.task-text').onblur = (e) => {
                    item.text = e.target.innerText;
                    saveDataToCloud();
                };

                const del = document.createElement('button');
                del.className = 'delete-task-btn'; del.innerText = '✕';
                del.onclick = () => { b.items = b.items.filter(i => i.id !== item.id); saveDataToCloud(); };

                div.appendChild(cb); div.appendChild(content); div.appendChild(del);
                container.appendChild(div);
            });
        }

        window.addTask = () => {
            const input = document.getElementById('new-task-input');
            const text = input.value.trim();
            if(!text) return;
            const b = blocks.find(x => x.id === currentBlockId);
            b.items.push({ id: Date.now().toString(), text, userName: myName, color: myColor, completed: false });
            input.value = '';
            saveDataToCloud();
        };

        window.closeModal = (id) => {
            document.getElementById(id).classList.remove('active');
            document.body.style.overflow = '';
            currentBlockId = null;
        };

        window.deleteCurrentBlock = () => {
            if(!confirm("このカテゴリを削除しますか？")) return;
            blocks = blocks.filter(x => x.id !== currentBlockId);
            saveDataToCloud();
            window.closeModal('modal');
        };

        // スワイプで閉じる
        setupSwipeToClose('modal', 'modal-content', 'modal-drag');
        function setupSwipeToClose(mId, cId, dId) {
            const m = document.getElementById(mId), c = document.getElementById(cId), d = document.getElementById(dId);
            let startY = 0, currentY = 0, isDragging = false;
            d.ontouchstart = (e) => { isDragging = true; startY = e.touches[0].clientY; c.style.transition = 'none'; };
            window.ontouchmove = (e) => {
                if(!isDragging) return;
                currentY = e.touches[0].clientY - startY;
                if(currentY > 0) c.style.transform = `translateY(${currentY}px)`;
            };
            window.ontouchend = () => {
                if(!isDragging) return;
                isDragging = false; c.style.transition = '';
                if(currentY > 150) window.closeModal(mId); else c.style.transform = '';
                currentY = 0;
            };
        }

        // タイトル変更の即時反映
        document.getElementById('modal-title').oninput = (e) => {
            const b = blocks.find(x => x.id === currentBlockId);
            b.title = e.target.value;
            saveDataToCloud();
        };

        window.addEventListener('resize', renderDashboard);
    </script>
</body>
</html>
